<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Veridrop · AI API 中转站检测工具{% endblock %}</title>
  <meta name="description" content="{% block description %}免费在线检测 AI API 中转站质量。Claude 支持 thinking signature 加密级验证,OpenAI 支持 Chat Completions 行为/协议级检测。{% endblock %}" />
  <meta name="keywords" content="AI API 中转站检测, Claude API 中转站, OpenAI 中转站检测, Gemini 中转站检测, API 中转站真伪, Claude thinking signature, API relay verification" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{% block og_title %}Veridrop · AI API 中转站检测{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}Claude 加密级验证与 OpenAI Chat Completions 检测已上线。{% endblock %}" />
  <meta property="og:url" content="{% block og_url %}https://veridrop.org/{% endblock %}" />
  <meta property="og:locale" content="zh_CN" />
  <meta name="twitter:card" content="summary_large_image" />
  {% block og_image %}{% endblock %}
  <link rel="canonical" href="{% block canonical %}https://veridrop.org/{% endblock %}" />
  <link rel="stylesheet" href="/static/style.css?v=20260505-1" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="/">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <circle cx="16" cy="16" r="14" stroke="#10b981" stroke-width="3"/>
          <path d="M9 16.5l5 5 9-10" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Veridrop</span>
      </a>
      <button
        class="nav-toggle"
        type="button"
        aria-label="打开菜单"
        aria-expanded="false"
        aria-controls="site-nav">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <a href="/">首页</a>
        <a href="/claude">Claude</a>
        <a href="/openai">OpenAI</a>
        <a href="/gemini">Gemini</a>
        <a href="/leaderboard">红黑榜</a>
        <a href="/faq">常见问题</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>Veridrop 用协议字段、能力探测和流式一致性检查,帮助用户识别 AI API 中转站质量。
      Claude 检测中的 API 密钥仅用于本次检测,不会被记录或留存。</p>
    <p class="muted small">© Veridrop · 中转站检测工具 · 独立测评 · 字段级穿透</p>
  </footer>
  <script src="/static/app.js" defer></script>
</body>
</html>
